<!DOCTYPE html>
<html>
<head>
    <title>Fancify My Text</title>
    <script src="fancifymytext.js"></script>
</head>

<body>

    <h1>Fancify my Text</h1>

    <!-- Text -->
    <fieldset>

        <legend>Text</legend>
        <textarea id="textInput" rows="4" cols="30"></textarea>

    </fieldset>

    <!-- UI Controls -->
    <fieldset>

        <legend>Fancify</legend>

        <button onclick="makeBigger()">Bigger!</button><br><br>

        <input type="radio" id="fancy" name="style" onchange="fancifyText()">
        <label for="fancy">FancyShmancy</label><br>

        <input type="radio" id="boring" name="style" onchange="fancifyText()">
        <label for="boring">BoringBetty</label><br><br>

        <button onclick="mooText()">Moo</button>

    </fieldset>

</body>
</html>
